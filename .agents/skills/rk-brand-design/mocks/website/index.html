<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<title>Røde Kors</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-screen-label="rodekors.no — landing">
<div id="root"></div>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Card.jsx"></script>
<script type="text/babel" src="Button.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="Donate.jsx"></script>
<script type="text/babel">
function App() {
  const [page, setPage] = React.useState('home');
  const [donating, setDonating] = React.useState(false);

  return (
    <>
      <Header active={page} onNav={setPage} onDonate={() => setDonating(true)} />

      <Hero
        onPrimary={() => setDonating(true)}
        onSecondary={() => setPage('volunteer')}
      />

      <section className="rk-section">
        <div className="rk-section-head">
          <h2>Slik hjelper vi</h2>
          <p>Vi er der mennesker trenger oss — i nabolaget, i kriser, og over hele verden.</p>
        </div>
        <div className="rk-grid">
          <Card title="Beredskap" meta="Lokalt og nasjonalt"
            onClick={() => setPage('help')}>
            Frivillige som rykker ut når noe skjer — fra leteaksjoner i fjellet til
            evakueringer ved storm.
          </Card>
          <Card title="Kors på halsen" tint accent meta="Ring 800 333 21"
            onClick={() => setPage('help')}>
            Et gratis og anonymt tilbud for barn og unge under 18 som trenger noen å
            snakke med.
          </Card>
          <Card title="Besøkstjenesten" meta="Hver uke i hele landet"
            onClick={() => setPage('help')}>
            Frivillige besøker eldre og andre som er ensomme, hjemme eller på
            institusjon.
          </Card>
          <Card title="Internasjonal hjelp" meta="Aktiv i 192 land">
            Sammen med søsterforeninger og Den internasjonale Røde Kors‑komiteen
            redder vi liv i krig og katastrofer.
          </Card>
          <Card title="Migrasjon" meta="Senter i 50 kommuner">
            Norsktrening, leksehjelp og flyktningguide for nyankomne.
          </Card>
          <Card title="Førstehjelp" tint meta="Kurs hver måned">
            Lær å redde liv. Vi tilbyr kurs for privatpersoner og bedrifter.
          </Card>
        </div>
      </section>

      <section className="rk-crisis">
        <div className="rk-crisis-inner">
          <div style={{flex: 1, minWidth: 280}}>
            <h3>Trenger du noen å snakke med?</h3>
            <p>Krise­telefonen er åpen hele døgnet, alle dager.</p>
          </div>
          <div style={{display: 'flex', gap: 12}}>
            <Button variant="primary" size="lg">Ring 815 33 300</Button>
            <Button variant="secondary" size="lg">Send melding</Button>
          </div>
        </div>
      </section>

      <Footer />

      {donating && (
        <div className="rk-overlay" onClick={(e) => { if (e.target === e.currentTarget) setDonating(false); }}>
          <div className="rk-dialog" role="dialog" aria-modal="true" aria-labelledby="donate-title">
            <button className="rk-dialog-close" onClick={() => setDonating(false)} aria-label="Lukk">×</button>
            <Donate onClose={() => setDonating(false)} />
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
