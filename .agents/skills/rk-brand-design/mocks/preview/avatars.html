<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body { margin: 0; padding: 24px; background: #fff; font-family: var(--ds-font-family); }
  .row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .av { background: #1E1E1E; color: #fff; border-radius: 9999px; display: inline-flex; align-items: center; justify-content: center; font-weight: 500; }
  .sm { width: 32px; height: 32px; font-size: 14px; }
  .md { width: 48px; height: 48px; font-size: 18px; }
  .lg { width: 64px; height: 64px; font-size: 24px; }
  .red { background: #D52B1E; }
  .ocean { background: #355770; }
  .group { display: flex; align-items: center; gap: 4px; }
</style>
</head><body>
<div class="row">
  <span class="av sm">MH</span>
  <span class="av md red">RØ</span>
  <span class="av lg ocean">OL</span>
  <div class="group">
    <span class="av md" style="border:2px solid #fff">A</span>
    <span class="av md red" style="border:2px solid #fff;margin-left:-12px">B</span>
    <span class="av md ocean" style="border:2px solid #fff;margin-left:-12px">C</span>
    <span class="av md" style="background:#797979;border:2px solid #fff;margin-left:-12px">+4</span>
  </div>
</div>
</body></html>
