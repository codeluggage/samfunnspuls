<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body { margin: 0; padding: 24px; background: #f3f3f3; font-family: var(--ds-font-family); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 720px; }
  .card { background: #fff; border: 1px solid #e8e8e8; border-radius: 8px; padding: 18px; box-shadow: 0 0 1px 0 rgba(0,0,0,0.16), 0 1px 2px 0 rgba(0,0,0,0.12); }
  .card h3 { font-size: 21px; font-weight: 500; margin: 0 0 6px; }
  .card p { font-size: 16px; color: #5d5d5d; margin: 0 0 12px; }
  .meta { font-size: 13px; color: #797979; }
  .tinted { background: #fcf1f0; border-color: #eeaba6; }
  .tinted h3 { color: #57110c; }
</style>
</head><body>
<div class="grid">
  <div class="card"><h3>Bli frivillig</h3><p>Ulike oppgaver i nærheten av der du bor.</p><span class="meta">Oppdatert i dag</span></div>
  <div class="card tinted"><h3>Akutt­hjelp</h3><p>Trenger du noen å snakke med? Ring 815 33 300.</p><span class="meta">Døgnåpent</span></div>
</div>
</body></html>
