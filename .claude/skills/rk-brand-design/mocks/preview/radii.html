<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body { margin: 0; padding: 28px; background: #fff; font-family: var(--ds-font-family); }
  .row { display: flex; gap: 18px; align-items: center; }
  .box { width: 78px; height: 78px; background: #D52B1E; display: flex; align-items: center; justify-content: center; color: #fff; font-family: var(--ds-font-family-mono); font-size: 11px; }
  .pill { width: 110px; height: 40px; background: #1E1E1E; border-radius: 9999px; display: flex; align-items: center; justify-content: center; color: #fff; font-family: var(--ds-font-family-mono); font-size: 11px; }
  .lbl { font-size: 11px; color: #5d5d5d; margin-top: 6px; font-weight: 500; text-align: center; }
</style>
</head><body>
<div class="row">
  <div><div class="box" style="border-radius:2px">2</div><div class="lbl">sm — chips</div></div>
  <div><div class="box" style="border-radius:4px">4</div><div class="lbl">md — default</div></div>
  <div><div class="box" style="border-radius:8px">8</div><div class="lbl">lg — cards</div></div>
  <div><div class="box" style="border-radius:12px">12</div><div class="lbl">xl — bento</div></div>
  <div><div class="pill">9999</div><div class="lbl">full — pills</div></div>
</div>
</body></html>
