<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body { margin: 0; padding: 24px; background: #fff; font-family: var(--ds-font-family); }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .tag { font-size: 14px; font-weight: 500; padding: 4px 10px; border-radius: 9999px; line-height: 1.3; }
  .neutral { background: #e8e8e8; color: #2b2b2b; }
  .red { background: #fae4e2; color: #57110c; }
  .info { background: #dcebf6; color: #042d4d; }
  .success { background: #daeddd; color: #023409; }
  .warning { background: #fae6c6; color: #3c2807; }
  .danger { background: #f8e4e4; color: #590d0d; }
  .badge { display: inline-flex; align-items: center; justify-content: center; min-width: 22px; height: 22px; padding: 0 7px; border-radius: 9999px; background: #D52B1E; color: #fff; font-size: 13px; font-weight: 500; }
</style>
</head><body>
<div class="row" style="margin-bottom:14px">
  <span class="tag neutral">v1.1 · Open Source</span>
  <span class="tag red">Frivillig</span>
  <span class="tag info">Informasjon</span>
  <span class="tag success">Godkjent</span>
  <span class="tag warning">Venter</span>
  <span class="tag danger">Avvist</span>
</div>
<div class="row">
  <span class="badge">5</span>
  <span class="badge" style="background:#0A71C0">12</span>
  <span class="badge" style="background:#1E1E1E">99+</span>
</div>
</body></html>
