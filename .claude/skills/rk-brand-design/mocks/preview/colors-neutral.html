<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #fff; font-family: var(--ds-font-family); }
  .row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }
  .swatch { width: 92px; height: 78px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.06); display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; box-sizing: border-box; font-size: 11px; line-height: 1.2; }
  .label { font-size: 11px; color: #5d5d5d; margin-top: 6px; font-weight: 500; text-align: center; }
  .hex { font-family: var(--ds-font-family-mono); font-size: 10px; opacity: 0.85; }
  .group { display: flex; flex-direction: column; align-items: stretch; width: 92px; }
</style>
</head><body>
<div class="row">
  <div class="group"><div class="swatch" style="background:#ffffff;color:#2b2b2b;border-color:#bcbcbc"><div class="hex">#fff</div></div><div class="label">bg default</div></div>
  <div class="group"><div class="swatch" style="background:#f3f3f3;color:#2b2b2b"><div class="hex">#f3f3f3</div></div><div class="label">bg tinted</div></div>
  <div class="group"><div class="swatch" style="background:#e8e8e8;color:#2b2b2b"><div class="hex">#e8e8e8</div></div><div class="label">surface tint</div></div>
  <div class="group"><div class="swatch" style="background:#bcbcbc;color:#2b2b2b"><div class="hex">#bcbcbc</div></div><div class="label">border subtle</div></div>
  <div class="group"><div class="swatch" style="background:#797979;color:#fff"><div class="hex">#797979</div></div><div class="label">border default</div></div>
  <div class="group"><div class="swatch" style="background:#5d5d5d;color:#fff"><div class="hex">#5d5d5d</div></div><div class="label">text subtle</div></div>
  <div class="group"><div class="swatch" style="background:#2b2b2b;color:#fff"><div class="hex">#2b2b2b</div></div><div class="label">text default</div></div>
  <div class="group"><div class="swatch" style="background:#1E1E1E;color:#fff"><div class="hex">#1E1E1E</div></div><div class="label">base</div></div>
</div>
</body></html>
