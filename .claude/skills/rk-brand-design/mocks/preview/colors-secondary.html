<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #fff; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; align-items: stretch; width: 110px; }
  .sw { height: 64px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.06); display: flex; align-items: flex-end; padding: 6px 8px; box-sizing: border-box; font-size: 10px; font-family: var(--ds-font-family-mono); }
  .name { font-size: 11px; color: #5d5d5d; margin-top: 6px; font-weight: 500; text-align: center; }
</style>
</head><body>
<div class="row">
  <div class="col"><div class="sw" style="background:#EA5A2A;color:#000">#EA5A2A</div><div class="name">Orange</div></div>
  <div class="col"><div class="sw" style="background:#96171A;color:#fff">#96171A</div><div class="name">Rust</div></div>
  <div class="col"><div class="sw" style="background:#F16670;color:#000">#F16670</div><div class="name">Pink</div></div>
  <div class="col"><div class="sw" style="background:#355770;color:#fff">#355770</div><div class="name">Ocean</div></div>
  <div class="col"><div class="sw" style="background:#6C733E;color:#fff">#6C733E</div><div class="name">Jungle</div></div>
</div>
</body></html>
