<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #fff; font-family: var(--ds-font-family); }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .swatch { width: 88px; height: 88px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.06); display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; box-sizing: border-box; color: #fff; font-size: 11px; line-height: 1.2; }
  .label { font-size: 12px; color: #5d5d5d; margin-top: 6px; font-weight: 500; }
  .hex { font-family: var(--ds-font-family-mono); font-size: 10px; opacity: 0.85; }
  .group { display: flex; flex-direction: column; align-items: flex-start; }
</style>
</head><body>
<div class="row">
  <div class="group"><div class="swatch" style="background:#D52B1E"><div>base</div><div class="hex">#D52B1E</div></div><div class="label">Primary Red</div></div>
  <div class="group"><div class="swatch" style="background:#b12419"><div>hover</div><div class="hex">#b12419</div></div><div class="label">Red hover</div></div>
  <div class="group"><div class="swatch" style="background:#8e1d14"><div>active</div><div class="hex">#8e1d14</div></div><div class="label">Red active</div></div>
  <div class="group"><div class="swatch" style="background:#fae4e2;color:#57110c"><div>surface</div><div class="hex">#fae4e2</div></div><div class="label">Red surface</div></div>
  <div class="group"><div class="swatch" style="background:#fcf1f0;color:#57110c"><div>tinted bg</div><div class="hex">#fcf1f0</div></div><div class="label">Red tinted</div></div>
</div>
</body></html>
