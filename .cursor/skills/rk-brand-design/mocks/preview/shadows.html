<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body { margin: 0; padding: 28px; background: #f3f3f3; font-family: var(--ds-font-family); }
  .row { display: flex; gap: 24px; align-items: center; }
  .box { width: 90px; height: 60px; background: #fff; display: flex; align-items: center; justify-content: center; font-family: var(--ds-font-family-mono); font-size: 11px; color: #2b2b2b; border: 1px solid #e8e8e8; }
  .lbl { display: block; text-align: center; font-size: 11px; color: #5d5d5d; margin-top: 6px; font-weight: 500; }
</style>
</head><body>
<div class="row">
  <div><div class="box" style="box-shadow:0 0 1px 0 rgba(0,0,0,0.16),0 1px 2px 0 rgba(0,0,0,0.12)">xs</div><span class="lbl">resting</span></div>
  <div><div class="box" style="box-shadow:0 0 1px 0 rgba(0,0,0,0.15),0 1px 2px 0 rgba(0,0,0,0.12),0 2px 4px 0 rgba(0,0,0,0.10)">sm</div><span class="lbl">hover</span></div>
  <div><div class="box" style="box-shadow:0 0 1px 0 rgba(0,0,0,0.14),0 2px 4px 0 rgba(0,0,0,0.12),0 4px 8px 0 rgba(0,0,0,0.12)">md</div><span class="lbl">popover</span></div>
  <div><div class="box" style="box-shadow:0 0 1px 0 rgba(0,0,0,0.13),0 3px 5px 0 rgba(0,0,0,0.13),0 6px 12px 0 rgba(0,0,0,0.14)">lg</div><span class="lbl">dialog</span></div>
  <div><div class="box" style="box-shadow:0 0 1px 0 rgba(0,0,0,0.12),0 4px 8px 0 rgba(0,0,0,0.16),0 12px 24px 0 rgba(0,0,0,0.16)">xl</div><span class="lbl">overlay</span></div>
</div>
</body></html>
