<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body { margin: 0; padding: 24px; background: #fff; font-family: var(--ds-font-family); }
  .field { display: flex; flex-direction: column; gap: 6px; max-width: 360px; margin-bottom: 16px; }
  label { font-size: 16px; font-weight: 500; color: #2b2b2b; }
  .help { font-size: 14px; color: #5d5d5d; }
  input, select { font-family: inherit; font-size: 18px; padding: 10px 12px; border: 1px solid #797979; border-radius: 4px; background: #fff; color: #2b2b2b; line-height: 1.3; }
  input:focus, select:focus { outline: 3px solid #2b2b2b; outline-offset: 2px; }
  .err input { border-color: #C01B1B; }
  .err .help { color: #b81a1a; }
</style>
</head><body>
<div class="field">
  <label for="navn">Fullt navn</label>
  <input id="navn" placeholder="Ola Nordmann">
  <span class="help">Som det står i passet ditt.</span>
</div>
<div class="field err">
  <label for="epost">E‑post</label>
  <input id="epost" value="ikke en e-post">
  <span class="help">Skriv inn en gyldig e‑postadresse.</span>
</div>
</body></html>
