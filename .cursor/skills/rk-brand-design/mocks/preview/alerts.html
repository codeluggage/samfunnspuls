<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body { margin: 0; padding: 24px; background: #f3f3f3; font-family: var(--ds-font-family); }
  .alert { display: flex; gap: 12px; padding: 14px 16px; border-radius: 4px; border: 1px solid; margin-bottom: 12px; max-width: 560px; align-items: flex-start; }
  .alert h4 { font-size: 18px; font-weight: 500; margin: 0 0 4px; }
  .alert p { font-size: 16px; margin: 0; }
  .info { background: #dcebf6; border-color: #1f7dc5; color: #042d4d; }
  .success { background: #daeddd; border-color: #108c22; color: #023409; }
  .warning { background: #fae6c6; border-color: #a56d13; color: #3c2807; }
  .danger { background: #f8e4e4; border-color: #ce4d4d; color: #590d0d; }
  .dot { width: 8px; height: 8px; border-radius: 9999px; margin-top: 9px; flex-shrink: 0; }
</style>
</head><body>
<div class="alert info"><div class="dot" style="background:#0A71C0"></div><div><h4>Informasjon</h4><p>Du har 2 oppgaver som venter.</p></div></div>
<div class="alert success"><div class="dot" style="background:#068718"></div><div><h4>Lagret</h4><p>Endringene dine er lagret.</p></div></div>
<div class="alert warning"><div class="dot" style="background:#EA9B1B"></div><div><h4>Vær oppmerksom</h4><p>Frist er om 3 dager.</p></div></div>
<div class="alert danger"><div class="dot" style="background:#C01B1B"></div><div><h4>Noe gikk galt</h4><p>Vi klarte ikke å lagre. Prøv igjen.</p></div></div>
</body></html>
