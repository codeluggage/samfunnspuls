<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #fff; font-family: var(--ds-font-family); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .item { border-radius: 8px; overflow: hidden; border: 1px solid #e8e8e8; }
  .head { padding: 14px 16px; color: #fff; font-weight: 500; }
  .body { padding: 12px 16px; background: #fff; font-size: 12px; }
  .row { display: flex; justify-content: space-between; padding: 4px 0; color: #5d5d5d; }
  .hex { font-family: var(--ds-font-family-mono); }
</style>
</head><body>
<div class="grid">
  <div class="item"><div class="head" style="background:#0A71C0">Info</div><div class="body"><div class="row"><span>base</span><span class="hex">#0A71C0</span></div><div class="row"><span>border</span><span class="hex">#1f7dc5</span></div><div class="row"><span>tinted</span><span class="hex">#dcebf6</span></div></div></div>
  <div class="item"><div class="head" style="background:#068718">Success</div><div class="body"><div class="row"><span>base</span><span class="hex">#068718</span></div><div class="row"><span>border</span><span class="hex">#108c22</span></div><div class="row"><span>tinted</span><span class="hex">#daeddd</span></div></div></div>
  <div class="item"><div class="head" style="background:#EA9B1B;color:#000">Warning</div><div class="body"><div class="row"><span>base</span><span class="hex">#EA9B1B</span></div><div class="row"><span>border</span><span class="hex">#a56d13</span></div><div class="row"><span>tinted</span><span class="hex">#fae6c6</span></div></div></div>
  <div class="item"><div class="head" style="background:#C01B1B">Danger</div><div class="body"><div class="row"><span>base</span><span class="hex">#C01B1B</span></div><div class="row"><span>border</span><span class="hex">#ce4d4d</span></div><div class="row"><span>tinted</span><span class="hex">#f8e4e4</span></div></div></div>
</div>
</body></html>
