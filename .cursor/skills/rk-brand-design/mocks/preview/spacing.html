<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body { margin: 0; padding: 24px; background: #fff; font-family: var(--ds-font-family); }
  .row { display: flex; gap: 14px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; }
  .bar { background: #D52B1E; height: 18px; border-radius: 2px; }
  .label { font-size: 11px; color: #5d5d5d; margin-top: 6px; font-family: var(--ds-font-family-mono); }
  .name { font-size: 10px; color: #2b2b2b; font-weight: 500; }
</style>
</head><body>
<div class="row">
  <div class="item"><div class="bar" style="width:4px"></div><div class="name">size-1</div><div class="label">4px</div></div>
  <div class="item"><div class="bar" style="width:8px"></div><div class="name">size-2</div><div class="label">8px</div></div>
  <div class="item"><div class="bar" style="width:12px"></div><div class="name">size-3</div><div class="label">12</div></div>
  <div class="item"><div class="bar" style="width:16px"></div><div class="name">size-4</div><div class="label">16</div></div>
  <div class="item"><div class="bar" style="width:24px"></div><div class="name">size-6</div><div class="label">24</div></div>
  <div class="item"><div class="bar" style="width:32px"></div><div class="name">size-8</div><div class="label">32</div></div>
  <div class="item"><div class="bar" style="width:44px"></div><div class="name">size-11</div><div class="label">44</div></div>
  <div class="item"><div class="bar" style="width:60px"></div><div class="name">size-15</div><div class="label">60</div></div>
  <div class="item"><div class="bar" style="width:120px"></div><div class="name">size-30</div><div class="label">120 hero</div></div>
</div>
</body></html>
