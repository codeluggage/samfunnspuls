<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body { margin: 0; padding: 28px; background: #fff; font-family: var(--ds-font-family); }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  button { font-family: var(--ds-font-family); font-size: 18px; font-weight: 500; padding: 10px 22px; border-radius: 4px; border: 1px solid transparent; cursor: pointer; line-height: 1.3; }
  .primary { background: #D52B1E; color: #fff; }
  .primary:hover { background: #b12419; }
  .secondary { background: #fff; color: #1E1E1E; border-color: #1E1E1E; }
  .secondary:hover { background: #f3f3f3; }
  .tertiary { background: transparent; color: #1E1E1E; border-color: transparent; }
  .tertiary:hover { background: #e8e8e8; }
  .danger { background: #C01B1B; color: #fff; }
  .danger:hover { background: #9b1616; }
  .sm { font-size: 16px; padding: 6px 14px; }
  .lg { font-size: 21px; padding: 14px 28px; }
</style>
</head><body>
<div class="row">
  <button class="primary">Lagre endringer</button>
  <button class="secondary">Avbryt</button>
  <button class="tertiary">Tilbake</button>
  <button class="danger">Slett</button>
</div>
<div class="row" style="margin-top:14px">
  <button class="primary sm">Liten</button>
  <button class="primary">Standard</button>
  <button class="primary lg">Stor</button>
</div>
</body></html>
